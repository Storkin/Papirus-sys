{% extends 'base.html' %}
{% load i18n %}
{% block content %}

<h1 class="h3 mb-4 text-gray-800">
    {% if form.instance.pk %}{% trans "Update Product" %}{% else %}{% trans "Add New Product" %}{% endif %}
</h1>

<div class="row">
    <div class="col-lg-8">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">{% trans "Product Details" %}</h6>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
                    <a href="{% url 'product_list' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
